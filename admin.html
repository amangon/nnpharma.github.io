<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NN Pharma Admin</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:#020617;
}

.logout{
  background:#ef4444;
  border:none;
  padding:8px 18px;
  border-radius:20px;
  color:white;
  cursor:pointer;
}

/* CONTAINER */
.container{
  padding:20px;
}

/* FORM */
.form{
  background:#020617;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:white;
}

button{
  padding:12px;
  border:none;
  border-radius:25px;
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:#020617;
  padding:15px;
  border-radius:15px;
}

.card img{
  width:100%;
  border-radius:10px;
}

.delete{
  background:#ef4444;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<h2>NN Pharma Admin</h2>
<button id="logoutBtn" class="logout">Logout</button>
</div>

<div class="container">

<div class="form">
<input id="name" placeholder="Product Name">

<select id="category">
<option>Tablet</option>
<option>Injection</option>
<option>Syrup</option>
<option>Capsule</option>
</select>

<input type="file" id="imageFile">

<img id="preview" style="width:100px;display:none;border-radius:10px;">

<input id="description" placeholder="Description">

<button id="addBtn">Add Product</button>
</div>

<div class="grid" id="productList"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKCKgHWREXMm76SzUptK1w2tLR-6V5J1k",
  authDomain: "nnpharma-new.firebaseapp.com",
  databaseURL: "https://nnpharma-new-default-rtdb.firebaseio.com",
  projectId: "nnpharma-new",
  storageBucket: "nnpharma-new.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);

// AUTH
onAuthStateChanged(auth,(user)=>{
  if(!user){
    window.location.href="login.html";
  }
});

// LOGOUT
logoutBtn.onclick = async ()=>{
  await signOut(auth);
  window.location.href="login.html";
};

// IMAGE PREVIEW
imageFile.onchange = (e)=>{
  const file = e.target.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
};

// ADD PRODUCT
addBtn.onclick = async ()=>{

  const name = nameInput.value;
  const category = category.value;
  const file = imageFile.files[0];
  const description = description.value;

  if(!name || !file || !description){
    alert("Fill all fields");
    return;
  }

  addBtn.innerText = "Uploading...";

  const storageRef = sRef(storage,"products/"+file.name);
  await uploadBytes(storageRef,file);
  const url = await getDownloadURL(storageRef);

  await push(ref(db,"products"),{
    name, category, image:url, description
  });

  addBtn.innerText = "Add Product";
  alert("Added ✅");
};

// LOAD PRODUCTS
onValue(ref(db,"products"),(snap)=>{
  productList.innerHTML="";
  const data = snap.val();

  for(let key in data){
    productList.innerHTML+=`
      <div class="card">
        <img src="${data[key].image}">
        <h4>${data[key].name}</h4>
        <p>${data[key].category}</p>
        <button class="delete" onclick="deleteProduct('${key}')">Delete</button>
      </div>
    `;
  }
});

// DELETE
window.deleteProduct = (key)=>{
  if(confirm("Delete product?")){
    remove(ref(db,"products/"+key));
  }
};
</script>

</body>
</html>
