<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NN Pharma Admin</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  background:#0f172a;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  background:#020617;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.header h2{
  color:#38bdf8;
}

.logout{
  background:#ef4444;
  border:none;
  padding:8px 18px;
  border-radius:20px;
  color:white;
  cursor:pointer;
}

/* MAIN */
.container{
  padding:30px;
}

/* CARD */
.card-box{
  background:#020617;
  padding:25px;
  border-radius:20px;
  margin-bottom:30px;
  border:1px solid rgba(255,255,255,0.05);
}

/* INPUT */
input, select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:white;
}

button{
  padding:12px;
  border:none;
  border-radius:25px;
  background:#38bdf8;
  color:white;
  cursor:pointer;
  width:100%;
  margin-top:10px;
}

/* PRODUCT GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.product{
  background:#020617;
  padding:15px;
  border-radius:15px;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.05);
}

.product:hover{
  transform:scale(1.03);
}

.product img{
  width:100%;
  border-radius:10px;
}

.product h4{
  margin-top:10px;
}

.delete{
  background:#ef4444;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<h2>NN Pharma Admin</h2>
<button class="logout" id="logoutBtn">Logout</button>
</div>

<div class="container">

<div class="card-box">
<h3>Add Product</h3>

<input id="name" placeholder="Product Name">

<select id="category">
<option>Tablet</option>
<option>Injection</option>
<option>Syrup</option>
<option>Capsule</option>
<option>Antibiotic</option>
</select>

<input type="file" id="imageFile">

<input id="description" placeholder="Description">

<button id="addBtn">Add Product</button>
</div>

<div class="grid" id="productList"></div>

</div>

</body>
</html>
