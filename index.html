<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NN Pharma</title>

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
  overflow-x:hidden;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.loader{
  width:60px;height:60px;
  border:6px solid #38bdf8;
  border-top:6px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
}

.logo{
  font-size:22px;
  color:#38bdf8;
  text-shadow:0 0 10px #38bdf8;
}

/* HERO */
.hero{
  text-align:center;
  padding:50px 20px;
}

.hero h1{
  font-size:36px;
  text-shadow:0 0 20px #38bdf8;
}

/* GLASS BANNER */
.banner{
  margin:20px;
  padding:15px;
  border-radius:15px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.1);
  text-align:center;
  animation:glow 2s infinite;
}

@keyframes glow{
  0%{box-shadow:0 0 10px #38bdf8;}
  50%{box-shadow:0 0 30px #38bdf8;}
  100%{box-shadow:0 0 10px #38bdf8;}
}

/* DRIP */
.drip{
  width:6px;
  height:60px;
  margin:auto;
  background:#38bdf8;
  border-radius:5px;
  animation:drop 1.2s infinite;
}
@keyframes drop{
  0%{height:0;opacity:0;}
  50%{height:60px;opacity:1;}
  100%{height:0;opacity:0;}
}

/* SEARCH */
.search{
  padding:20px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:25px;
  padding:20px;
}

/* CARD */
.card{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:20px;
  transform-style:preserve-3d;
  transition:0.4s;
  cursor:pointer;
}

.card:hover{
  transform:rotateY(10deg) scale(1.05);
}

.card img{
  width:100%;
  border-radius:10px;
}

/* FLOAT ANIMATION */
@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

.card{
  animation:float 3s ease-in-out infinite;
}
</style>
</head>

<body>

<div id="loader"><div class="loader"></div></div>

<div class="nav">
<div class="logo">💊 NN Pharma</div>
</div>

<div class="hero">
<h1>Next Gen Pharma Store</h1>
<p>Modern Healthcare Experience</p>
</div>

<div class="banner">💉 Safe • Trusted • Fast Medicines</div>
<div class="drip"></div>

<div class="search">
<input id="search" placeholder="Search medicine...">
</div>

<div class="grid" id="products"></div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKCKgHWREXMm76SzUptK1w2tLR-6V5J1k",
  authDomain: "nnpharma-new.firebaseapp.com",
  databaseURL: "https://nnpharma-new-default-rtdb.firebaseio.com",
  projectId: "nnpharma-new",
  storageBucket: "nnpharma-new.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// LOAD PRODUCTS
onValue(ref(db,"products"),(snap)=>{
  const container = document.getElementById("products");
  container.innerHTML="";
  const data = snap.val();

  for(let key in data){
    container.innerHTML+=`
      <div class="card" data-aos="zoom-in">
        <img src="${data[key].image}">
        <h3>${data[key].name}</h3>
        <p>${data[key].category}</p>
      </div>
    `;
  }

  AOS.init();
});

// SEARCH
search.oninput = (e)=>{
  const val = e.target.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(val) ? "block":"none";
  });
};

// LOADER
window.onload = ()=>{
  setTimeout(()=>loader.style.display="none",1200);
};
</script>

</body>
</html>
