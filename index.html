<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NN Pharma</title>

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:#020617;
  color:white;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.loader{
  width:50px;height:50px;
  border:5px solid #38bdf8;
  border-top:5px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg);}}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo{color:#38bdf8;font-size:22px;}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
}

/* DR EFFECT BANNER */
.banner{
  text-align:center;
  margin:10px 20px;
  padding:12px;
  border-radius:10px;
  background:linear-gradient(90deg,#38bdf8,#0ea5e9);
  animation:pulse 1.5s infinite;
  box-shadow:0 0 20px #38bdf8;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

/* DRIP EFFECT */
.drip{
  width:4px;
  height:50px;
  margin:auto;
  background:#38bdf8;
  animation:drop 1s infinite;
}

@keyframes drop{
  0%{height:0;opacity:0;}
  50%{height:50px;opacity:1;}
  100%{height:0;opacity:0;}
}

/* SEARCH */
.search{
  padding:20px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:#020617;
  padding:15px;
  border-radius:15px;
}

.card img{
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="loader"><div class="loader"></div></div>

<div class="nav">
<div class="logo">NN Pharma</div>
</div>

<div class="hero">
<h1>💊 NN Pharma</h1>
<p>Trusted Medicines</p>
</div>

<div class="banner">💉 Fast Relief • Safe Medicines • Trusted Pharma</div>
<div class="drip"></div>

<div class="search">
<input id="search" placeholder="Search medicine...">
</div>

<div class="grid" id="products"></div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKCKgHWREXMm76SzUptK1w2tLR-6V5J1k",
  authDomain: "nnpharma-new.firebaseapp.com",
  databaseURL: "https://nnpharma-new-default-rtdb.firebaseio.com",
  projectId: "nnpharma-new",
  storageBucket: "nnpharma-new.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// LOAD PRODUCTS
onValue(ref(db,"products"),(snap)=>{
  const container = document.getElementById("products");
  container.innerHTML="";
  const data = snap.val();

  for(let key in data){
    container.innerHTML+=`
      <div class="card" data-aos="fade-up">
        <img src="${data[key].image}">
        <h3>${data[key].name}</h3>
        <p>${data[key].category}</p>
      </div>
    `;
  }

  AOS.init();
});

// SEARCH
search.oninput = (e)=>{
  const val = e.target.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(val) ? "block":"none";
  });
};

// LOADER
window.onload = ()=>{
  setTimeout(()=>loader.style.display="none",1000);
};
</script>

</body>
</html>
