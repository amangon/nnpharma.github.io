<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NN Pharma</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.loader-circle{
  width:60px;
  height:60px;
  border:5px solid #38bdf8;
  border-top:5px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:#020617;
}

.logo{
  color:#38bdf8;
  font-size:22px;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:32px;
}

.hero p{
  margin-top:10px;
  color:#94a3b8;
}

/* SEARCH */
.search-box{
  padding:20px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:#020617;
  border-radius:15px;
  padding:15px;
  transform:translateY(50px);
  opacity:0;
  transition:0.5s;
}

.card.show{
  transform:translateY(0);
  opacity:1;
}

.card img{
  width:100%;
  border-radius:10px;
}

.category{
  color:#38bdf8;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-circle"></div>
</div>

<!-- NAV -->
<div class="nav">
<div class="logo">NN Pharma</div>
</div>

<!-- HERO -->
<div class="hero">
<h1>Welcome to NN Pharma 💊</h1>
<p>Trusted medicines & healthcare products</p>
</div>

<!-- SEARCH -->
<div class="search-box">
<input id="search" placeholder="Search medicine...">
</div>

<!-- PRODUCTS -->
<div class="grid" id="products"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKCKgHWREXMm76SzUptK1w2tLR-6V5J1k",
  authDomain: "nnpharma-new.firebaseapp.com",
  databaseURL: "https://nnpharma-new-default-rtdb.firebaseio.com",
  projectId: "nnpharma-new",
  storageBucket: "nnpharma-new.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("products");

// LOAD PRODUCTS
onValue(ref(db,"products"),(snap)=>{
  container.innerHTML="";
  const data = snap.val();

  for(let key in data){
    container.innerHTML+=`
      <div class="card">
        <img src="${data[key].image}">
        <h3>${data[key].name}</h3>
        <p class="category">${data[key].category}</p>
        <p>${data[key].description}</p>
      </div>
    `;
  }

  animateCards();
});

// SCROLL ANIMATION
function animateCards(){
  const cards = document.querySelectorAll(".card");

  const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add("show");
      }
    });
  });

  cards.forEach(card=>observer.observe(card));
}

// SEARCH
search.oninput = (e)=>{
  const val = e.target.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(val) ? "block":"none";
  });
};

// LOADER HIDE
window.onload = ()=>{
  setTimeout(()=>{
    loader.style.display="none";
  },1000);
};
</script>

</body>
</html>
