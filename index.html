<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NN Pharma</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

/* NAVBAR */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:#020617;
}

.logo{color:#38bdf8;font-size:22px;}

/* SEARCH */
.search-box{
  padding:20px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:#020617;
  border-radius:15px;
  padding:15px;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  border-radius:10px;
}

.category{
  color:#38bdf8;
}
</style>
</head>

<body>

<div class="nav">
<div class="logo">NN Pharma</div>
</div>

<div class="search-box">
<input id="search" placeholder="Search medicine...">
</div>

<div class="grid" id="products"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("products");

onValue(ref(db,"products"),(snap)=>{
  container.innerHTML="";
  const data = snap.val();

  for(let key in data){
    container.innerHTML+=`
      <div class="card">
        <img src="${data[key].image}">
        <h3>${data[key].name}</h3>
        <p class="category">${data[key].category}</p>
        <p>${data[key].description}</p>
      </div>
    `;
  }
});

// SEARCH
document.getElementById("search").addEventListener("input",(e)=>{
  const value = e.target.value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(value) ? "block":"none";
  });
});
</script>

</body>
</html>
