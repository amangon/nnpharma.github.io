<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NN Pharma</title>

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:#020617;
  color:white;
  transition:0.3s;
}

/* LIGHT MODE */
.light{
  background:#f1f5f9;
  color:black;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.loader{
  width:50px;height:50px;
  border:5px solid #38bdf8;
  border-top:5px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg);}}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo{color:#38bdf8;font-size:22px;}

.toggle{
  cursor:pointer;
  padding:6px 12px;
  border-radius:20px;
  background:#38bdf8;
}

/* HERO */
.hero{
  text-align:center;
  padding:50px 20px;
}

/* SEARCH */
.search{
  padding:20px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#020617;
  padding:15px;
  border-radius:15px;
  cursor:pointer;
}

.card img{
  width:100%;
  border-radius:10px;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
  max-width:300px;
}

/* CART */
.cart{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#38bdf8;
  padding:10px 15px;
  border-radius:20px;
}
</style>
</head>

<body>

<div id="loader"><div class="loader"></div></div>

<div class="nav">
<div class="logo">NN Pharma</div>
<div class="toggle" onclick="toggleMode()">🌙</div>
</div>

<div class="hero">
<h1>Welcome 💊</h1>
<p>Best Pharma Store</p>
</div>

<div class="search">
<input id="search" placeholder="Search medicine...">
</div>

<div class="grid" id="products"></div>

<div class="cart">🛒 <span id="cartCount">0</span></div>

<div class="popup" id="popup">
<div class="popup-box" id="popupBox"></div>
</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKCKgHWREXMm76SzUptK1w2tLR-6V5J1k",
  authDomain: "nnpharma-new.firebaseapp.com",
  databaseURL: "https://nnpharma-new-default-rtdb.firebaseio.com",
  projectId: "nnpharma-new",
  storageBucket: "nnpharma-new.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let cart = 0;

// LOAD PRODUCTS
onValue(ref(db,"products"),(snap)=>{
  const container = document.getElementById("products");
  container.innerHTML="";
  const data = snap.val();

  for(let key in data){
    container.innerHTML+=`
      <div class="card" data-aos="fade-up" onclick='openPopup(${JSON.stringify(data[key])})'>
        <img src="${data[key].image}">
        <h3>${data[key].name}</h3>
        <p>${data[key].category}</p>
      </div>
    `;
  }

  AOS.init();
});

// SEARCH
search.oninput = (e)=>{
  const val = e.target.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(val) ? "block":"none";
  });
};

// POPUP
window.openPopup = (data)=>{
  popup.style.display="flex";
  popupBox.innerHTML=`
    <img src="${data.image}" style="width:100%">
    <h2>${data.name}</h2>
    <p>${data.description}</p>
    <button onclick="addToCart()">Add to Cart</button>
  `;
};

popup.onclick = ()=>popup.style.display="none";

// CART
window.addToCart = ()=>{
  cart++;
  cartCount.innerText = cart;
};

// DARK MODE
window.toggleMode = ()=>{
  document.body.classList.toggle("light");
};

// LOADER
window.onload = ()=>{
  setTimeout(()=>loader.style.display="none",1000);
};
</script>

</body>
</html>
